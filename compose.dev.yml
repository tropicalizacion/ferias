name: ferias

services:
  web:
    build: 
      context: ./web
      target: dev
    ports:
      - "8000:8000"
    env_file:
      - .env
      - .env.dev
    volumes:
      - ./web:/app
    depends_on:
      database:
        condition: service_healthy
        restart: true

  database:
    build:
      context: ./database
    env_file:
      - .env
    environment:
      - POSTGRES_DB=${DB_NAME:-ferias}
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_HOST_AUTH_METHOD=trust
    volumes:
      - database_data:/var/lib/postgresql    
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${DB_USER:-postgres}", "-d", "${DB_NAME:-ferias}"]
      interval: 10s
      timeout: 5s
      retries: 5
 
volumes:
  database_data:
