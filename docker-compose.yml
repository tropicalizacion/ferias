name: ferias
services:
  web:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      database:
        condition: service_healthy
        restart: true
    env_file:
      - .env

  database:
    build:
      context: ./database
    environment:
      - POSTGRES_DB=${DB_NAME:-ferias}
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_HOST_AUTH_METHOD=trust
    volumes:
      - database_data:/var/lib/postgresql    
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${DB_USER:-postgres}", "-d", "${DB_NAME:-ferias}"]
      interval: 10s
      timeout: 5s
      retries: 5
 
volumes:
  postgres_db:
